name: Herald
options:
  # Public-safe defaults. Replace locally if you regenerate the project
  # for a private deployment with your own signing/bundle identifiers.
  bundleIdPrefix: net.fihonline
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "26.3"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true

schemes:
  Herald:
    build:
      targets:
        Herald: all
        HeraldWidgets: all
        HeraldIntents: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: HeraldTests
          parallelizable: true
        - name: HeraldUITests
          parallelizable: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Herald:
    type: application
    platform: iOS
    entitlements:
      path: Herald/Herald.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
        com.apple.developer.aps-environment: development
        com.apple.developer.carplay-communications: true
        com.apple.security.application-groups:
          - group.net.fihonline.herald
    sources:
      - path: Herald
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Herald/Resources
        optional: true
    dependencies:
      - target: HeraldWidgets
      - target: HeraldNotificationService
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fihonline.herald
        PRODUCT_NAME: Herald
        MARKETING_VERSION: "2.2.4"
        CURRENT_PROJECT_VERSION: "61"
        DEVELOPMENT_TEAM: 58U7UPFS53
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: Herald
    info:
      path: Herald/Resources/Info.plist
      properties:
        CFBundleDisplayName: Herald
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Herald uses your location to provide contextual recommendations and nearby suggestions."
        NSHealthShareUsageDescription: "Herald reads your health data to offer personalized wellness insights."
        NSHealthUpdateUsageDescription: "Herald does not write health data, but this permission is required by the system."
        NSCameraUsageDescription: "Herald uses the camera to capture photos and documents for analysis."
        NSPhotoLibraryUsageDescription: "Herald accesses your photo library to help organize and search your photos."
        NSMicrophoneUsageDescription: "Herald uses the microphone for voice conversations in Talk Mode."
        NSSiriUsageDescription: "Herald uses Siri to send and read messages on CarPlay and with voice commands."
        INIntentsSupported:
          - INSendMessageIntent
          - INSearchForMessagesIntent
          - INSetMessageAttributeIntent
        NSLocationAlwaysAndWhenInUseUsageDescription: "Herald uses your location in the background to provide contextual awareness and proactive suggestions."
        NSMotionUsageDescription: "Herald uses motion data to understand your current activity for contextual awareness."
        NSSpeechRecognitionUsageDescription: "Herald uses speech recognition for voice commands and local transcription."
        APP_HOSTED_RELAY_URL: "https://your-relay.example.com/v1"
        APP_HOSTED_RELAY_ENABLED: true
        APP_PRIVACY_URL: "https://your-domain.example.com/privacy.html"
        APP_TERMS_URL: "https://your-domain.example.com/terms.html"
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        BGTaskSchedulerPermittedIdentifiers:
          - net.fihonline.herald.refresh
          - net.fihnews.HeraldBGProcessing
        UIBackgroundModes:
          - processing
          - location
          - remote-notification
          - audio
        UIRequiredDeviceCapabilities:
          - arm64
        NSUserActivityTypes:
          - net.fihonline.herald.viewNote
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"

  HeraldWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HeraldWidgets
    entitlements:
      path: HeraldWidgets/HeraldWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.net.fihonline.herald
    info:
      path: HeraldWidgets/Info.plist
      properties:
        CFBundleDisplayName: HeraldWidgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fihonline.herald.Widgets
        PRODUCT_NAME: HeraldWidgets
        MARKETING_VERSION: "2.2.4"
        CURRENT_PROJECT_VERSION: "61"
        SWIFT_VERSION: "6.2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 58U7UPFS53
        TARGETED_DEVICE_FAMILY: "1,2"

  HeraldNotificationService:
    type: app-extension
    platform: iOS
    sources:
      - path: HeraldNotificationService
    info:
      path: HeraldNotificationService/Info.plist
      properties:
        CFBundleDisplayName: HeraldNotificationService
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).NotificationService"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fihonline.herald.NotificationService
        PRODUCT_NAME: HeraldNotificationService
        MARKETING_VERSION: "2.2.4"
        CURRENT_PROJECT_VERSION: "61"
        SWIFT_VERSION: "6.2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 58U7UPFS53
        TARGETED_DEVICE_FAMILY: "1,2"

  HeraldIntents:
    type: app-extension
    platform: iOS
    sources:
      - path: HeraldIntents
    entitlements:
      path: Herald/Herald.entitlements
      properties:
        com.apple.developer.siri: true
        com.apple.security.application-groups:
          - group.net.fihonline.herald
    info:
      path: HeraldIntents/Info.plist
      properties:
        CFBundleDisplayName: HeraldIntents
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.intents-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).IntentHandler"
          IntentsSupported:
            - INSendMessageIntent
            - INSearchForMessagesIntent
            - INSetMessageAttributeIntent
          IntentsRestrictedWhileLocked: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fihonline.herald.Intents
        PRODUCT_NAME: HeraldIntents
        MARKETING_VERSION: "2.2.4"
        CURRENT_PROJECT_VERSION: "61"
        SWIFT_VERSION: "6.2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 58U7UPFS53
        TARGETED_DEVICE_FAMILY: "1,2"

  HeraldTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HeraldTests
    dependencies:
      - target: Herald
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fihonline.herald.tests
        TEST_TARGET_NAME: Herald
        GENERATE_INFOPLIST_FILE: true

  HeraldUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HeraldUITests
    dependencies:
      - target: Herald
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: net.fihonline.herald.uitests
        TEST_TARGET_NAME: Herald
        GENERATE_INFOPLIST_FILE: true
