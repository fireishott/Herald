name: HermesMobile
options:
  # Public-safe defaults. Replace locally if you regenerate the project
  # for a private deployment with your own signing/bundle identifiers.
  bundleIdPrefix: io.hermesmobile
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.3"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    ENABLE_PREVIEWS: true

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    version: 130.0.0

targets:
  HermesMobile:
    type: application
    platform: iOS
    entitlements:
      path: HermesMobile/HermesMobile.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.healthkit.background-delivery: true
        com.apple.security.application-groups:
          - group.io.hermesmobile.HermesMobile
    sources:
      - path: HermesMobile
        excludes:
          - "**/.DS_Store"
    resources:
      - path: HermesMobile/Resources
        optional: true
    dependencies:
      - package: WebRTC
      - target: HermesMobileWidgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.hermesmobile.HermesMobile
        PRODUCT_NAME: HermesMobile
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_CFBundleDisplayName: HermesMobile
    info:
      path: HermesMobile/Resources/Info.plist
      properties:
        CFBundleDisplayName: Hermes
        CFBundleShortVersionString: "1.1.0"
        CFBundleVersion: "2"
        UILaunchScreen: {}
        NSLocationWhenInUseUsageDescription: "Hermes uses your location to provide contextual recommendations and nearby suggestions."
        NSHealthShareUsageDescription: "Hermes reads your health data to offer personalized wellness insights."
        NSHealthUpdateUsageDescription: "Hermes does not write health data, but this permission is required by the system."
        NSCameraUsageDescription: "Hermes uses the camera to capture photos and documents for analysis."
        NSPhotoLibraryUsageDescription: "Hermes accesses your photo library to help organize and search your photos."
        NSMicrophoneUsageDescription: "Hermes uses the microphone for voice conversations in Talk Mode."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Hermes uses your location in the background to provide contextual awareness and proactive suggestions."
        NSMotionUsageDescription: "Hermes uses motion data to understand your current activity for contextual awareness."
        NSSpeechRecognitionUsageDescription: "Hermes uses speech recognition for voice commands and local transcription."
        NSSupportsLiveActivities: true
        NSSupportsLiveActivitiesFrequentUpdates: true
        UIBackgroundModes:
          - processing
          - location
          - remote-notification
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
          UISceneConfigurations:
            CPTemplateApplicationSceneSessionRoleApplication:
              - UISceneClassName: CPTemplateApplicationScene
                UISceneConfigurationName: CarPlay
                UISceneDelegateClassName: "$(PRODUCT_MODULE_NAME).CarPlaySceneDelegate"

  HermesMobileWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: HermesMobileWidgets
    entitlements:
      path: HermesMobileWidgets/HermesMobileWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.io.hermesmobile.HermesMobile
    info:
      path: HermesMobileWidgets/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.hermesmobile.HermesMobile.Widgets
        PRODUCT_NAME: HermesMobileWidgets
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "6.2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        TARGETED_DEVICE_FAMILY: "1,2"

  HermesMobileTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HermesMobileTests
    dependencies:
      - target: HermesMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.hermesmobile.HermesMobile.tests
        TEST_TARGET_NAME: HermesMobile
        GENERATE_INFOPLIST_FILE: true

  HermesMobileUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HermesMobileUITests
    dependencies:
      - target: HermesMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.hermesmobile.HermesMobile.uitests
        TEST_TARGET_NAME: HermesMobile
        GENERATE_INFOPLIST_FILE: true
