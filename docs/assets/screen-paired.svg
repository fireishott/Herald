<svg viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141618"/>
      <stop offset="100%" stop-color="#1A1D23"/>
    </linearGradient>
    <linearGradient id="btnGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="flameGrad" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#331100" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4A1800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1D23" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="phoneClip3">
      <rect x="0" y="0" width="390" height="844" rx="44"/>
    </clipPath>
  </defs>

  <g clip-path="url(#phoneClip3)">
    <rect width="390" height="844" fill="url(#bg3)"/>

    <!-- Flame watermark (abstract shape) -->
    <g opacity="0.15" transform="translate(200, 180)">
      <path d="M60,350 C60,350 20,280 30,220 C40,160 70,140 80,100 C90,60 75,0 75,0 C75,0 110,60 120,100 C130,140 150,150 160,200 C170,250 180,280 160,320 C140,360 100,380 80,380 C60,380 40,360 60,350 Z" fill="url(#flameGrad)" stroke="#442200" stroke-width="1" stroke-opacity="0.2"/>
      <path d="M85,350 C85,350 65,310 70,270 C75,230 95,220 100,190 C105,160 95,120 95,120 C95,120 120,160 125,190 C130,220 140,230 145,260 C150,290 150,310 140,330 C130,350 110,360 100,360 C90,360 80,355 85,350 Z" fill="#331500" fill-opacity="0.3"/>
    </g>

    <!-- Progress bar (all filled) -->
    <rect x="24" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
    <rect x="116" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
    <rect x="208" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
    <rect x="300" y="60" width="66" height="3" rx="1.5" fill="#FFFFFF"/>

    <!-- Step label -->
    <text x="24" y="90" font-family="SF Mono, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5">004 · PAIRED</text>
    <text x="366" y="90" font-family="SF Mono, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1" text-anchor="end">STEP 4/4</text>

    <!-- Title -->
    <text x="24" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="78" font-weight="400" fill="#FFFFFF" letter-spacing="-1">PAIRED.</text>

    <!-- Subtitle -->
    <text x="24" y="270" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic" fill="#AAAAAA">Handshake complete.</text>
    <text x="24" y="305" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic" fill="#AAAAAA">Session key installed</text>
    <text x="24" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="24" font-style="italic" fill="#AAAAAA">in the iOS keychain.</text>

    <!-- Relay info -->
    <text x="24" y="410" font-family="SF Mono, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#777777" letter-spacing="1.5">RELAY</text>
    <text x="366" y="410" font-family="SF Mono, SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="#FFFFFF" letter-spacing="0.5" text-anchor="end">127.0.0.1</text>
    <line x1="24" y1="420" x2="366" y2="420" stroke="#333333" stroke-width="1"/>

    <!-- OPEN APP button -->
    <rect x="24" y="778" width="342" height="52" rx="26" fill="url(#btnGrad3)"/>
    <text x="195" y="810" font-family="SF Mono, SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="2" text-anchor="middle">OPEN APP →</text>
  </g>

  <!-- Phone bezel -->
  <rect x="0" y="0" width="390" height="844" rx="44" fill="none" stroke="#333333" stroke-width="2"/>
</svg>