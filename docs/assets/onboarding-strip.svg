<svg viewBox="0 0 1260 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141618"/>
      <stop offset="100%" stop-color="#1A1D23"/>
    </linearGradient>
    <linearGradient id="sbtn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="100%" stop-color="#FF6B00"/>
    </linearGradient>
    <linearGradient id="sflame" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#331100" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#4A1800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1D23" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════ SCREEN 1: WELCOME ═══════════════ -->
  <g transform="translate(10, 28)">
    <clipPath id="sc1">
      <rect width="390" height="844" rx="44"/>
    </clipPath>
    <g clip-path="url(#sc1)">
      <rect width="390" height="844" fill="url(#sbg)"/>
      <text x="32" y="52" font-family="-apple-system, system-ui, sans-serif" font-size="16" font-weight="600" fill="#FFFFFF">8:30</text>
      <text x="32" y="108" font-family="SFMono-Regular, Menlo, monospace" font-size="13" font-weight="500" fill="#999999" letter-spacing="2">HERMES · iOS</text>
      <text x="358" y="108" font-family="SFMono-Regular, Menlo, monospace" font-size="13" font-weight="500" fill="#999999" letter-spacing="1" text-anchor="end">V2.0.0</text>
      <text x="32" y="310" font-family="-apple-system, system-ui, sans-serif" font-size="82" font-weight="800" fill="#FFFFFF" letter-spacing="-1">HERMES</text>
      <text x="32" y="420" font-family="-apple-system, system-ui, sans-serif" font-size="82" font-weight="800" fill="#555555" letter-spacing="-1">ON</text>
      <text x="32" y="540" font-family="Georgia, serif" font-size="86" fill="#FFFFFF" letter-spacing="-1">iOS.</text>
      <text x="32" y="620" font-family="Georgia, serif" font-size="26" font-style="italic" fill="#AAAAAA">An iOS client for the</text>
      <text x="32" y="655" font-family="Georgia, serif" font-size="26" font-style="italic" fill="#AAAAAA">Hermes Agent framework.</text>
      <line x1="32" y1="730" x2="358" y2="730" stroke="#333333" stroke-width="1"/>
      <text x="55" y="764" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5" text-anchor="middle">CHAT</text>
      <text x="155" y="764" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5" text-anchor="middle">VOICE</text>
      <text x="255" y="764" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5" text-anchor="middle">VISION</text>
      <text x="345" y="764" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5" text-anchor="middle">SENSORS</text>
      <rect x="24" y="786" width="342" height="52" rx="26" fill="url(#sbtn)"/>
      <text x="195" y="818" font-family="SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="2" text-anchor="middle">BEGIN →</text>
    </g>
    <rect width="390" height="844" rx="44" fill="none" stroke="#333333" stroke-width="2"/>
  </g>

  <!-- ═══════════════ SCREEN 2: ENDPOINT ═══════════════ -->
  <g transform="translate(435, 28)">
    <clipPath id="sc2">
      <rect width="390" height="844" rx="44"/>
    </clipPath>
    <g clip-path="url(#sc2)">
      <rect width="390" height="844" fill="url(#sbg)"/>
      <!-- Progress bar -->
      <rect x="24" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
      <rect x="116" y="60" width="82" height="3" rx="1.5" fill="#333333"/>
      <rect x="208" y="60" width="82" height="3" rx="1.5" fill="#333333"/>
      <rect x="300" y="60" width="66" height="3" rx="1.5" fill="#333333"/>
      <text x="24" y="90" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5">001 · RELAY</text>
      <text x="366" y="90" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1" text-anchor="end">STEP 1/4</text>
      <text x="24" y="160" font-family="-apple-system, system-ui, sans-serif" font-size="58" font-weight="800" fill="#FFFFFF" letter-spacing="-1">ENDPOINT.</text>
      <text x="24" y="200" font-family="Georgia, serif" font-size="20" font-style="italic" fill="#AAAAAA">where your Herald is reachable.</text>
      <text x="24" y="248" font-family="SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600" fill="#777777" letter-spacing="1.5">CONNECTION MODE</text>
      <!-- Tailscale card -->
      <rect x="24" y="264" width="342" height="72" rx="12" fill="none" stroke="#333333" stroke-width="1.5"/>
      <text x="74" y="293" font-family="-apple-system, system-ui, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">Tailscale</text>
      <text x="74" y="315" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#777777">Private tailnet reachability for a</text>
      <text x="74" y="330" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#777777">local Hermes relay.</text>
      <!-- Self-Hosted card -->
      <rect x="24" y="348" width="342" height="72" rx="12" fill="none" stroke="#FF6B00" stroke-width="2"/>
      <text x="74" y="380" font-family="-apple-system, system-ui, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF">Self-Hosted Relay</text>
      <text x="74" y="400" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#777777">Bring your own public Hermes</text>
      <text x="74" y="415" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#777777">relay URL.</text>
      <circle cx="344" cy="384" r="12" fill="#FF6B00"/>
      <polyline points="337,384 342,389 351,379" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- URL label + field -->
      <text x="24" y="458" font-family="SFMono-Regular, Menlo, monospace" font-size="11" font-weight="600" fill="#777777" letter-spacing="1.5">RELAY URL</text>
      <rect x="24" y="470" width="342" height="48" rx="10" fill="#222426" stroke="#333333" stroke-width="1"/>
      <text x="44" y="500" font-family="SFMono-Regular, Menlo, monospace" font-size="14" fill="#AAAAAA">https://relay.example.com/v1</text>
      <text x="24" y="540" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#666666">Point this at your public Hermes relay — e.g.</text>
      <text x="24" y="558" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#666666">https://relay.example.com/v1</text>
      <!-- Bottom buttons -->
      <rect x="24" y="738" width="166" height="48" rx="10" fill="none" stroke="#444444" stroke-width="1.5"/>
      <text x="107" y="768" font-family="SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#FFFFFF" letter-spacing="1.5" text-anchor="middle">PASTE</text>
      <rect x="200" y="738" width="166" height="48" rx="10" fill="none" stroke="#444444" stroke-width="1.5"/>
      <text x="283" y="768" font-family="SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" fill="#FFFFFF" letter-spacing="1.5" text-anchor="middle">SCAN QR</text>
      <rect x="24" y="798" width="342" height="52" rx="26" fill="url(#sbtn)"/>
      <text x="195" y="830" font-family="SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="2" text-anchor="middle">CONTINUE →</text>
    </g>
    <rect width="390" height="844" rx="44" fill="none" stroke="#333333" stroke-width="2"/>
  </g>

  <!-- ═══════════════ SCREEN 3: PAIRED ═══════════════ -->
  <g transform="translate(860, 28)">
    <clipPath id="sc3">
      <rect width="390" height="844" rx="44"/>
    </clipPath>
    <g clip-path="url(#sc3)">
      <rect width="390" height="844" fill="url(#sbg)"/>
      <!-- Flame watermark -->
      <g opacity="0.15" transform="translate(200, 180)">
        <path d="M60,350 C60,350 20,280 30,220 C40,160 70,140 80,100 C90,60 75,0 75,0 C75,0 110,60 120,100 C130,140 150,150 160,200 C170,250 180,280 160,320 C140,360 100,380 80,380 C60,380 40,360 60,350 Z" fill="url(#sflame)" stroke="#442200" stroke-width="1" stroke-opacity="0.2"/>
      </g>
      <!-- Progress bar (all filled) -->
      <rect x="24" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
      <rect x="116" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
      <rect x="208" y="60" width="82" height="3" rx="1.5" fill="#FFFFFF"/>
      <rect x="300" y="60" width="66" height="3" rx="1.5" fill="#FFFFFF"/>
      <text x="24" y="90" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1.5">004 · PAIRED</text>
      <text x="366" y="90" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#999999" letter-spacing="1" text-anchor="end">STEP 4/4</text>
      <text x="24" y="200" font-family="Georgia, serif" font-size="78" fill="#FFFFFF" letter-spacing="-1">PAIRED.</text>
      <text x="24" y="270" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#AAAAAA">Handshake complete.</text>
      <text x="24" y="305" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#AAAAAA">Session key installed</text>
      <text x="24" y="340" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#AAAAAA">in the iOS keychain.</text>
      <text x="24" y="410" font-family="SFMono-Regular, Menlo, monospace" font-size="12" font-weight="500" fill="#777777" letter-spacing="1.5">RELAY</text>
      <text x="366" y="410" font-family="SFMono-Regular, Menlo, monospace" font-size="14" font-weight="500" fill="#FFFFFF" letter-spacing="0.5" text-anchor="end">127.0.0.1</text>
      <line x1="24" y1="420" x2="366" y2="420" stroke="#333333" stroke-width="1"/>
      <rect x="24" y="778" width="342" height="52" rx="26" fill="url(#sbtn)"/>
      <text x="195" y="810" font-family="SFMono-Regular, Menlo, monospace" font-size="15" font-weight="700" fill="#FFFFFF" letter-spacing="2" text-anchor="middle">OPEN APP →</text>
    </g>
    <rect width="390" height="844" rx="44" fill="none" stroke="#333333" stroke-width="2"/>
  </g>
</svg>