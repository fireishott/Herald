<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <rect width="800" height="200" fill="#0A0A0A"/>
  <!-- iPhone -->
  <rect x="30" y="60" width="140" height="80" rx="12" fill="#1A1D23" stroke="#F5F0E8" stroke-width="1"/>
  <text x="100" y="105" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#F5F0E8" text-anchor="middle">iPhone / iPad</text>
  <!-- Relay -->
  <rect x="250" y="60" width="140" height="80" rx="12" fill="#1A1D23" stroke="#F5F0E8" stroke-width="1"/>
  <text x="320" y="105" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#F5F0E8" text-anchor="middle">Relay</text>
  <!-- Connector -->
  <rect x="470" y="60" width="140" height="80" rx="12" fill="#1A1D23" stroke="#F5F0E8" stroke-width="1"/>
  <text x="540" y="105" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#F5F0E8" text-anchor="middle">Connector</text>
  <!-- Runtime -->
  <rect x="660" y="60" width="120" height="80" rx="12" fill="#1A1D23" stroke="#F5F0E8" stroke-width="1"/>
  <text x="720" y="105" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#F5F0E8" text-anchor="middle">Runtime</text>
  <!-- Connecting lines -->
  <line x1="170" y1="100" x2="250" y2="100" stroke="#FF6B00" stroke-width="2"/>
  <line x1="390" y1="100" x2="470" y2="100" stroke="#FF6B00" stroke-width="2"/>
  <line x1="610" y1="100" x2="660" y2="100" stroke="#FF6B00" stroke-width="2"/>
  <!-- Labels -->
  <text x="210" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#FF6B00" text-anchor="middle">HTTPS</text>
  <text x="430" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#FF6B00" text-anchor="middle">MCP</text>
  <text x="635" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#FF6B00" text-anchor="middle">WS</text>
</svg>
