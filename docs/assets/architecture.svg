<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 220" width="860" height="220">
  <defs>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E2024"/>
      <stop offset="100%" stop-color="#141618"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF3D00" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FF6B00" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FF3D00" stop-opacity="0"/>
    </linearGradient>
    <filter id="nodeShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#FF6B00"/>
    </marker>
    <marker id="arrowGlow" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#FF6B00" filter="url(#glowFilter)"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="220" fill="#0A0A0A"/>

  <!-- Nodes -->
  <!-- iPhone/iPad -->
  <g filter="url(#nodeShadow)">
    <rect x="20" y="70" width="150" height="65" rx="10" fill="url(#nodeGrad)" stroke="#FF6B00" stroke-width="1.2"/>
    <!-- Top accent bar -->
    <rect x="20" y="70" width="150" height="2" rx="1" fill="#FF6B00" opacity="0.6"/>
    <text x="95" y="100" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#F5F0E8" text-anchor="middle" font-weight="600">iPhone / iPad</text>
    <text x="95" y="118" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#FF6B00" text-anchor="middle" font-weight="500">HERALD app</text>
  </g>

  <!-- Relay -->
  <g filter="url(#nodeShadow)">
    <rect x="240" y="70" width="150" height="65" rx="10" fill="url(#nodeGrad)" stroke="#FF6B00" stroke-width="1.2"/>
    <rect x="240" y="70" width="150" height="2" rx="1" fill="#FF6B00" opacity="0.6"/>
    <text x="315" y="100" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#F5F0E8" text-anchor="middle" font-weight="600">Relay</text>
    <text x="315" y="118" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#FF6B00" text-anchor="middle" font-weight="500">herald-relay</text>
  </g>

  <!-- Connector -->
  <g filter="url(#nodeShadow)">
    <rect x="460" y="70" width="150" height="65" rx="10" fill="url(#nodeGrad)" stroke="#FF6B00" stroke-width="1.2"/>
    <rect x="460" y="70" width="150" height="2" rx="1" fill="#FF6B00" opacity="0.6"/>
    <text x="535" y="100" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#F5F0E8" text-anchor="middle" font-weight="600">Connector</text>
    <text x="535" y="118" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#FF6B00" text-anchor="middle" font-weight="500">herald-connector</text>
  </g>

  <!-- Runtime -->
  <g filter="url(#nodeShadow)">
    <rect x="680" y="70" width="150" height="65" rx="10" fill="url(#nodeGrad)" stroke="#FF6B00" stroke-width="1.2"/>
    <rect x="680" y="70" width="150" height="2" rx="1" fill="#FF6B00" opacity="0.6"/>
    <text x="755" y="100" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="13" fill="#F5F0E8" text-anchor="middle" font-weight="600">AI Runtime</text>
    <text x="755" y="118" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#FF6B00" text-anchor="middle" font-weight="500">Ollama / Hermes</text>
  </g>

  <!-- Connection lines with glow -->
  <line x1="170" y1="102" x2="240" y2="102" stroke="#FF6B00" stroke-width="1.5" marker-end="url(#arrow)" filter="url(#glowFilter)"/>
  <line x1="390" y1="102" x2="460" y2="102" stroke="#FF6B00" stroke-width="1.5" marker-end="url(#arrow)" filter="url(#glowFilter)"/>
  <line x1="610" y1="102" x2="680" y2="102" stroke="#FF6B00" stroke-width="1.5" marker-end="url(#arrow)" filter="url(#glowFilter)"/>

  <!-- Protocol labels -->
  <rect x="178" y="85" width="54" height="16" rx="3" fill="#0A0A0A" stroke="#FF6B00" stroke-width="0.5" opacity="0.8"/>
  <text x="205" y="96" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#FF6B00" text-anchor="middle" font-weight="600">HTTPS</text>

  <rect x="398" y="85" width="54" height="16" rx="3" fill="#0A0A0A" stroke="#FF6B00" stroke-width="0.5" opacity="0.8"/>
  <text x="425" y="96" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#FF6B00" text-anchor="middle" font-weight="600">SOCKETS</text>

  <rect x="618" y="85" width="54" height="16" rx="3" fill="#0A0A0A" stroke="#FF6B00" stroke-width="0.5" opacity="0.8"/>
  <text x="645" y="96" font-family="'SF Mono', 'Fira Code', 'Courier New', monospace" font-size="8" fill="#FF6B00" text-anchor="middle" font-weight="600">MCP</text>

  <!-- Bottom accent line -->
  <rect x="0" y="218" width="860" height="2" fill="url(#accentLine)"/>
</svg>