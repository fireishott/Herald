<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0.3" y2="0">
      <stop offset="0%" stop-color="#FF3D00"/>
      <stop offset="40%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#FF9500"/>
    </linearGradient>
    <linearGradient id="hotCore" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF6B00"/>
      <stop offset="50%" stop-color="#FFCC00"/>
      <stop offset="100%" stop-color="#FFF5E0"/>
    </linearGradient>
    <linearGradient id="emberGlow" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#FF3D00" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF6B00" stop-opacity="0"/>
    </linearGradient>
    <filter id="flameShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComponentTransfer in="blur"><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Flame mark -->
  <g transform="translate(20, 8)" filter="url(#flameShadow)">
    <!-- Outer flame body -->
    <path d="M32 100 C10 80 0 55 12 35 C18 25 24 38 26 45 C28 30 35 10 50 0 C45 20 48 30 52 38 C56 20 60 28 62 40 C68 28 72 40 70 58 C68 75 60 88 50 100 Z"
          fill="url(#flameGrad)"/>
    <!-- Inner hot tip -->
    <path d="M50 100 C38 85 32 68 38 52 C42 42 46 50 48 58 C50 48 54 38 58 48 C62 60 60 78 50 100 Z"
          fill="url(#hotCore)"/>
    <!-- Ember glow accent -->
    <path d="M36 100 C20 82 12 62 20 42 C24 32 28 42 30 50 C32 38 38 22 50 8 C44 26 46 38 48 48 C52 34 58 30 62 44 C66 32 70 42 70 60 C68 78 58 92 50 100 Z"
          fill="url(#emberGlow)"/>
  </g>

  <!-- HERALD text -->
  <text x="120" y="78"
        font-family="'SF Pro Display', -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-size="56"
        font-weight="700"
        letter-spacing="10"
        fill="#F5F0E8"
        filter="url(#textGlow)">HERALD</text>

  <!-- Subtle accent underline -->
  <rect x="120" y="88" width="340" height="2" rx="1" fill="#FF6B00" opacity="0.4"/>
</svg>