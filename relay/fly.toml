# Replace `app` and `PUBLIC_BASE_URL` with your own deployment values.
app = "hermes-mobile-relay"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[env]
RELAY_ENVIRONMENT = "production"
PUBLIC_BASE_URL = "https://your-relay.example.com/v1"
HERMES_ADAPTER = "connector"

[http_service]
internal_port = 8000
force_https = true
auto_start_machines = true
auto_stop_machines = "stop"
# Keep at least one machine warm so the first iOS request of the day doesn't
# eat a 10–30s cold-start. Self-hosters on a tight budget can set this to 0.
min_machines_running = 1

  [http_service.concurrency]
  # Each relay connection is long-lived (SSE stream from iOS + a WebSocket from
  # the connector) — counting "requests" penalises the normal steady state and
  # triggers 503s well before the machine is actually under CPU/memory pressure.
  type = "connections"
  soft_limit = 200
  hard_limit = 250

  [[http_service.checks]]
  interval = "15s"
  timeout = "2s"
  grace_period = "10s"
  method = "GET"
  path = "/v1/health"
  protocol = "http"

[[vm]]
cpu_kind = "shared"
cpus = 1
memory = "1gb"
