services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: herald
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  relay:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/herald
      PUBLIC_BASE_URL: http://127.0.0.1:8000/v1
    depends_on:
      - postgres
    ports:
      - "8000:8000"

volumes:
  postgres_data:
